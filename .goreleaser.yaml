version: 2

project_name: ktui

before:
  hooks:
    - go test ./...

builds:
  - id: ktui
    main: ./cmd/ktui
    binary: ktui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: ktui
    ids:
      - ktui
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - install.sh
      - install.ps1

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  gitea:
    owner: gary
    name: ktui
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## 本次更新重点

    - 新增首次启动配置向导：未配置 URL 时可直接在终端输入 Komari 地址和可选 API key，并保存到配置文件。
    - 新增节点搜索、排序和过滤：支持 `/` 搜索节点名、地区、标签、分组、IP、OS 和 UUID，支持按状态、CPU、RAM、流量和过期时间排序，并可快速筛选离线、即将过期和高负载节点。
    - 新增异常高亮和阈值配置：离线、CPU/RAM/磁盘超过阈值、过期或即将过期会在列表和详情页高亮；阈值可通过配置文件、`ktui config set` 或设置页调整。
    - 改进详情页图表体验：支持点击图表或按 `f` 进入聚焦模式，并可在聚焦图表间切换。
    - 改进终端交互：搜索结果页支持逐级返回，过滤会跳过没有结果的条件，底部操作和鼠标点击行为更稳定。

    本 Release 由 GoReleaser 自动生成。

    请下载与你的系统和架构匹配的 ktui 压缩包，并使用 checksums.txt 校验 SHA256。

gitea_urls:
  api: https://gitea.bytevibe.dev/api/v1
  download: https://gitea.bytevibe.dev
  skip_tls_verify: false

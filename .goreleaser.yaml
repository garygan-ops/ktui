version: 2

project_name: ktui

before:
  hooks:
    - go test ./...

builds:
  - id: ktui
    main: ./cmd/ktui
    binary: ktui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: ktui
    ids:
      - ktui
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - install.sh
      - install.ps1

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  gitea:
    owner: gary
    name: ktui
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## 本次更新重点

    - 新增 About 视图：按 `?` 可以查看 ktui 构建信息、Komari 服务端信息、连接状态、显示设置和常用命令。
    - 重构命令行结构：新增 `ktui status`，将更新命令拆为 `ktui update check` 和 `ktui update install`，并使用 `--mode sheet|line` 统一显示模式参数。
    - 新增 Komari 服务端更新提示：TUI 会根据当前 Komari 服务端版本检查 `komari-monitor/komari` GitHub Release，有新版本时可按 `u` 查看更新详情。
    - 改进 TUI 交互与发现性：设置页可进入 About，About 支持键盘和鼠标滚动，底部操作提示覆盖更多视图。
    - 修复滚动条和边框显示问题：避免滚动条与表格边沿重合，并统一 ASCII / UTF-8 模式下边框颜色。

    本 Release 由 GoReleaser 自动生成。

    请下载与你的系统和架构匹配的 ktui 压缩包，并使用 checksums.txt 校验 SHA256。

gitea_urls:
  api: https://gitea.bytevibe.dev/api/v1
  download: https://gitea.bytevibe.dev
  skip_tls_verify: false

version: 2

project_name: ktui

before:
  hooks:
    - go test ./...

builds:
  - id: ktui
    main: ./cmd/ktui
    binary: ktui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: ktui
    ids:
      - ktui
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - install.sh
      - install.ps1

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  gitea:
    owner: gary
    name: ktui
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## 本次更新重点

    - 新增 Profile 多站点管理：支持 `ktui profile add/list/current/use/rename/remove`，可为多个 Komari 站点保存独立 URL 和 API key。
    - 支持运行中切换 Profile：Settings 页面可直接切换当前 profile，切换后会重建连接、清空旧站点缓存并重新加载数据。
    - 支持 Profile 重命名：命令行可使用 `ktui profile rename <old> <new>`，Settings 页面可通过 `rename_profile` 编辑当前 profile 名称。
    - 新增 `realtime_window`：可设置 `1m`、`5m`、`10m` 控制 realtime 图表横轴范围，并移除用户侧 `realtime_points` 配置。
    - 更新 Settings / About / README / help 文档：更清楚展示当前 profile、站点名、连接 URL 和 profile 操作方式。

    本 Release 由 GoReleaser 自动生成。

    请下载与你的系统和架构匹配的 ktui 压缩包，并使用 checksums.txt 校验 SHA256。

gitea_urls:
  api: https://gitea.bytevibe.dev/api/v1
  download: https://gitea.bytevibe.dev
  skip_tls_verify: false

version: 2

project_name: ktui

before:
  hooks:
    - go test ./...

builds:
  - id: ktui
    main: ./cmd/ktui
    binary: ktui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: ktui
    ids:
      - ktui
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - install.sh
      - install.ps1

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  gitea:
    owner: gary
    name: ktui
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## 本次更新重点

    - 新增节点状态导出：支持 `ktui export json`、`ktui export csv` 和 `ktui export markdown`，方便排查问题、生成报告或分享当前节点状态。
    - 新增流量阈值展示：列表、详情和导出结果会显示节点总流量使用率、上下行用量和 Komari 配置的流量限制。
    - 改进 TUI 可读性：列表和详情页增加滚动提示，7d/30d 图表横坐标改为显示日期，长周期图表更容易判断时间范围。
    - 改进图表聚焦体验：Realtime 聚焦模式切换窗口时，即使新窗口数据还在加载，也会停留在聚焦页并显示加载提示。
    - 修复 Windows/WezTerm Realtime 图表空白问题：启动 TUI 前会校验本机时间与 Komari 服务端时间，时间偏差过大时提示用户修正系统时间后再进入应用。

    本 Release 由 GoReleaser 自动生成。

    请下载与你的系统和架构匹配的 ktui 压缩包，并使用 checksums.txt 校验 SHA256。

gitea_urls:
  api: https://gitea.bytevibe.dev/api/v1
  download: https://gitea.bytevibe.dev
  skip_tls_verify: false
